<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Plant Health Monitor</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --muted: #94a3b8;
        --text: #e2e8f0;
        --accent: #22c55e;
        --accent2: #16a34a;
        --error: #ef4444;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(180deg, #020617, #0f172a);
        color: var(--text);
      }
      .wrap {
        max-width: 980px;
        margin: 32px auto;
        padding: 0 16px;
      }
      .card {
        background: rgba(17, 24, 39, 0.88);
        border: 1px solid #1f2937;
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 1.5rem;
      }
      p {
        color: var(--muted);
        margin: 6px 0 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr));
        gap: 10px;
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 5px;
        color: #cbd5e1;
      }
      input[type="number"],
      input[type="file"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #020617;
        color: var(--text);
        padding: 8px 10px;
      }
      .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      .primary {
        background: var(--accent);
        color: #06240f;
      }
      .primary:hover {
        background: var(--accent2);
      }
      .secondary {
        background: #334155;
        color: #e2e8f0;
      }
      #status {
        margin-top: 10px;
        min-height: 1.2rem;
        color: #cbd5e1;
      }
      #status.error {
        color: var(--error);
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        background: #020617;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 12px;
        max-height: 440px;
        overflow: auto;
      }
      .small {
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>AI Plant Health Monitoring</h1>
        <p>Upload a plant image, enter sensor values, and run the full analysis pipeline.</p>
      </div>

      <div class="card">
        <div class="grid">
          <div>
            <label for="moisture">Soil moisture</label>
            <input id="moisture" type="number" value="25" />
          </div>
          <div>
            <label for="temperature">Temperature (C)</label>
            <input id="temperature" type="number" value="28" />
          </div>
          <div>
            <label for="light">Light</label>
            <input id="light" type="number" value="600" />
          </div>
        </div>
        <div style="margin-top: 10px">
          <label for="image">Plant image</label>
          <input id="image" type="file" accept="image/*" />
        </div>
        <div class="actions">
          <button class="primary" id="runBtn">Run Analysis</button>
          <button class="secondary" id="refreshBtn">Refresh Latest Analysis</button>
          <button class="secondary" id="sampleBtn">Use Random Sensor Sample</button>
          <label class="inline small">
            <input id="autoRefresh" type="checkbox" checked />
            Auto-refresh
          </label>
          <label class="inline small">
            Interval (s)
            <input id="refreshSeconds" type="number" value="15" min="5" style="width: 90px" />
          </label>
        </div>
        <div id="status" class="small"></div>
        <div id="lastUpdated" class="small" style="color: #94a3b8"></div>
      </div>

      <div class="card">
        <label>Latest Uploaded Image</label>
        <img
          id="latestPreview"
          alt="Latest uploaded plant"
          style="width: 100%; max-height: 360px; object-fit: contain; border: 1px solid #334155; border-radius: 10px; background: #020617"
        />
      </div>

      <div class="card">
        <label>Result JSON</label>
        <pre id="output">{}</pre>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const outEl = document.getElementById("output");
      const lastUpdatedEl = document.getElementById("lastUpdated");
      const refreshSecondsEl = document.getElementById("refreshSeconds");
      const autoRefreshEl = document.getElementById("autoRefresh");
      const latestPreviewEl = document.getElementById("latestPreview");
      let refreshTimer = null;

      function setStatus(msg, isError = false) {
        statusEl.textContent = msg;
        statusEl.className = isError ? "small error" : "small";
      }

      function val(id) {
        return Number(document.getElementById(id).value);
      }

      function markUpdated() {
        lastUpdatedEl.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      }

      function refreshImagePreview() {
        latestPreviewEl.src = `/latest-image?t=${Date.now()}`;
      }

      async function fetchLatestAnalysis(silent = false) {
        try {
          const r = await fetch("/analysis");
          const data = await r.json();
          if (!r.ok) {
            // If prerequisites are missing, do not spam loud errors during auto refresh.
            const detail = data && data.detail ? JSON.stringify(data.detail) : JSON.stringify(data);
            if (!silent) setStatus(`Analysis fetch failed: ${detail}`, true);
            return;
          }
          outEl.textContent = JSON.stringify(data, null, 2);
          refreshImagePreview();
          markUpdated();
          if (!silent) setStatus("Latest analysis loaded.");
        } catch (err) {
          const msg = err instanceof Error ? err.message : String(err);
          if (!silent) setStatus(`Error: ${msg}`, true);
        }
      }

      function startAutoRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        if (!autoRefreshEl.checked) return;
        const sec = Math.max(5, Number(refreshSecondsEl.value) || 15);
        refreshTimer = setInterval(() => fetchLatestAnalysis(true), sec * 1000);
      }

      document.getElementById("sampleBtn").addEventListener("click", () => {
        document.getElementById("moisture").value = Math.floor(Math.random() * 90) + 5;
        document.getElementById("temperature").value = Math.floor(Math.random() * 18) + 18;
        document.getElementById("light").value = Math.floor(Math.random() * 1100) + 50;
      });

      document.getElementById("runBtn").addEventListener("click", async () => {
        const imageInput = document.getElementById("image");
        if (!imageInput.files || !imageInput.files.length) {
          setStatus("Please choose an image file first.", true);
          return;
        }

        const payload = {
          moisture: val("moisture"),
          temperature: val("temperature"),
          light: val("light"),
        };

        try {
          setStatus("Posting sensor data...");
          let r = await fetch("/sensor-data", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!r.ok) throw new Error(await r.text());

          setStatus("Uploading image...");
          const fd = new FormData();
          fd.append("file", imageInput.files[0]);
          r = await fetch("/image", { method: "POST", body: fd });
          if (!r.ok) throw new Error(await r.text());
          refreshImagePreview();

          setStatus("Running analysis...");
          await fetchLatestAnalysis(true);
          setStatus("Analysis complete.");
        } catch (err) {
          const msg = err instanceof Error ? err.message : String(err);
          setStatus(`Error: ${msg}`, true);
        }
      });

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        setStatus("Refreshing latest analysis...");
        await fetchLatestAnalysis(true);
        setStatus("Latest analysis loaded.");
      });

      autoRefreshEl.addEventListener("change", startAutoRefresh);
      refreshSecondsEl.addEventListener("change", startAutoRefresh);

      // Initialize view with current analysis if available, then keep polling.
      fetchLatestAnalysis(true);
      refreshImagePreview();
      startAutoRefresh();
    </script>
  </body>
</html>
