# YOLO dataset config.
# Ultralytics resolves ``path`` against the **process working directory** (run ``train.py`` from ``backend/``).
# Place images under datasets/plant_leaves/images/{train,val} and labels under labels/{train,val}.

path: datasets/plant_leaves
train: images/train
val: images/val

names:
  0: healthy_leaf
  1: yellow_leaf
  2: spotted_leaf
  3: damaged_leaf

nc: 4
